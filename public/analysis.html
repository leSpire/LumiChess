<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeliteChess — Analyse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
  <link rel="stylesheet" href="assets/css/analysis.css" />
</head>
<body>
  <main class="analysis-shell">
    <header class="analysis-header">
      <div class="analysis-tabs">
        <button class="tab is-active">Analyse</button>
        <button class="tab">Explorateur</button>
        <button class="tab">Parties</button>
      </div>
      <div class="brand">LeliteChess</div>
    </header>

    <section class="analysis-content">
      <section class="board-panel">
        <div class="panel-head">
          <div class="player-card">Noirs</div>
          <div class="player-card">IA Stockfish</div>
        </div>
        <div id="analysisBoard" class="analysis-board"></div>
        <div class="board-controls">
          <button id="newGameBtn">Nouvelle partie</button>
          <button id="flipBtn">Retourner</button>
          <button id="undoBtn">Annuler</button>
          <button id="connectBtn">Connexion live</button>
        </div>
        <p id="analysisStatus" class="status"></p>
      </section>

      <aside class="side-panel">
        <h2 id="evalTitle">Évaluation: égalité</h2>
        <div id="gameState" class="state-chip">Trait aux blancs</div>
        <div class="moves-wrap">
          <h3>Historique des coups</h3>
          <ol id="moveList"></ol>
        </div>
        <div class="legend">
          <p>✔ Mouvements légaux</p>
          <p>✔ Échec / mat</p>
          <p>✔ Roque, en passant, promotion</p>
          <p>✔ Drag & drop + sons</p>
          <p>✔ WebSocket prêt (optionnel)</p>
        </div>
      </aside>
    </section>
  </main>

  <audio id="moveSound" preload="auto" src="https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3"></audio>
  <audio id="captureSound" preload="auto" src="https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3"></audio>
  <audio id="checkSound" preload="auto" src="https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-check.mp3"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="assets/js/analysis-ui.js"></script>
</body>
</html>
