<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumiChess — Connexion</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell glow">
      <p class="auth-kicker">LumiChess</p>
      <h1>Bienvenue 👋</h1>
      <p class="muted">Choisissez comment entrer: connexion, inscription ou mode invité.</p>

      <form id="authForm" class="auth-form">
        <div class="auth-row">
          <label for="authPseudo">Pseudo</label>
          <input id="authPseudo" placeholder="ex: LumiMaster" />
        </div>
        <div class="auth-row">
          <label for="authEmail">Email (optionnel pour connexion)</label>
          <input id="authEmail" type="email" placeholder="ex: toi@mail.com" />
        </div>
        <div class="auth-row">
          <label for="authPassword">Mot de passe</label>
          <input id="authPassword" type="password" minlength="6" required placeholder="••••••" />
        </div>
        <div class="auth-actions">
          <button class="btn primary glow" type="submit">Connexion</button>
          <button class="btn glow" type="button" id="registerBtn">Inscription</button>
        </div>
      </form>

      <div class="auth-divider"><span>ou</span></div>
      <button class="btn ghost glow full" type="button" id="guestBtn">Jouer en mode invité</button>

      <p class="muted" id="authStatus">Vos données restent stockées localement sur cet appareil, y compris vos identifiants récents.</p>
    </section>
  </main>

  <script src="assets/js/auth.js"></script>
</body>
</html>
